<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Librescoot Uplink</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1><img src="images/logo-small.png" srcset="images/logo-small@2x.png 2x" alt="Librescoot Uplink"></h1>
      <div class="header-buttons">
        <button class="icon-btn" id="scootersBtn" title="Manage scooters" aria-label="Manage scooters">
          <svg width="20" height="20" viewBox="0 -960 960 960" fill="currentColor"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
        </button>
        <button class="icon-btn" id="apiKeyBtn" title="Authentication" aria-label="Authentication">
          <svg width="20" height="20" viewBox="0 -960 960 960" fill="currentColor"><path d="M280-400q-33 0-56.5-23.5T200-480q0-33 23.5-56.5T280-560q33 0 56.5 23.5T360-480q0 33-23.5 56.5T280-400Zm0 160q-100 0-170-70T40-480q0-100 70-170t170-70q66 0 121 33t87 87h472v240h-80v120H600v-120H488q-32 54-87 87t-121 33Z"/></svg>
        </button>
        <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh">
          <svg width="20" height="20" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-820q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Authentication dialog -->
  <div class="dialog-overlay" id="apiKeyDialog">
    <div class="dialog">
      <button class="dialog-close" data-close="apiKeyDialog">×</button>
      <h2>Authentication</h2>
      <p class="section-label">Sign in with username &amp; password</p>
      <div class="input-group">
        <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
        <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
        <button id="loginBtn">Login</button>
      </div>
      <p class="section-label" style="margin-top:14px">Or use an API key</p>
      <div class="input-group">
        <input type="password" id="apiKeyInput" placeholder="Enter API key">
        <button id="saveKeyBtn">Save</button>
        <button id="clearKeyBtn">Clear</button>
      </div>
      <div id="apiKeyStatus" class="status hidden"></div>
    </div>
  </div>

  <!-- Manage scooters dialog -->
  <div class="dialog-overlay" id="scootersDialog">
    <div class="dialog">
      <button class="dialog-close" data-close="scootersDialog">×</button>
      <h2>Manage Scooters</h2>
      <div class="input-group">
        <input type="text" id="newScooterId" placeholder="Identifier (VIN)">
        <input type="text" id="newScooterName" placeholder="Name (optional)">
        <button id="addScooterBtn">Add</button>
      </div>
      <div id="addScooterStatus" class="status hidden"></div>
      <div id="newScooterResult" class="hidden"></div>
      <div id="registryList"></div>
    </div>
  </div>

  <!-- History dialog -->
  <div class="dialog-overlay" id="historyDialog">
    <div class="dialog dialog-wide">
      <button class="dialog-close" data-close="historyDialog">×</button>
      <h2 id="historyTitle">History</h2>
      <div class="history-controls">
        <label>Range:
          <select id="historyRange">
            <option value="1">Last 1h</option>
            <option value="6">Last 6h</option>
            <option value="24" selected>Last 24h</option>
            <option value="168">Last 7d</option>
          </select>
        </label>
        <button id="historyReloadBtn">Reload</button>
      </div>
      <div id="historyStatus" class="status hidden"></div>
      <div id="historyCharts"></div>
    </div>
  </div>

  <div class="container">
    <div id="scootersContainer">
      <div class="loading">Loading…</div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
